<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Detalles de la mascota publicada. Información de contacto para ayudar a reunirla con su familia.">
    <title>Detalle de Mascota | PetFinder</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        /* Estilos adicionales para la página de detalle */
        .pet-placeholder {
            width: 100%;
            height: 100%;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-lg);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
            transition: var(--transition-fast);
        }

        .back-link:hover {
            color: var(--primary);
        }

        .contact-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .contact-value {
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <span class="logo-icon">🐾</span>
                <span>PetFinder</span>
            </a>

            <nav class="nav">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="reportar.html" class="nav-link">Reportar Mascota</a>
                <a href="reportar.html" class="btn btn-primary btn-sm">
                    <span>+</span> Nueva Publicación
                </a>
            </nav>

            <button class="mobile-menu-btn" aria-label="Menú">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <!-- Detail Section -->
    <section class="detail-section">
        <div class="container">
            <a href="index.html" class="back-link">
                ← Volver al listado
            </a>

            <div id="detail-container">
                <!-- El contenido se carga dinámicamente -->
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <p class="footer-text">
                © 2026 PetFinder. Ayudando a reunir familias. 🐾
            </p>
            <div class="footer-links">
                <a href="#" class="footer-link">Sobre nosotros</a>
                <a href="#" class="footer-link">Contacto</a>
                <a href="#" class="footer-link">Privacidad</a>
            </div>
        </div>
    </footer>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
